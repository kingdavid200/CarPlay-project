<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>Dash</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/mapbox-gl/2.15.0/mapbox-gl.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mapbox-gl/2.15.0/mapbox-gl.js"></script>
<style>
  :root{
    --bg:#0a0a0a;
    --panel:#141414;
    --amber:#ff9500;
    --red:#ff3b30;
    --grey:#8a8a8a;
    --line:#2a2a2a;
    --font-num: 'Courier New', ui-monospace, monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--bg); color:#eee;
    font-family:-apple-system, system-ui, sans-serif;
    overflow:hidden;
    position:fixed; inset:0;
  }
  #app{
    display:flex; flex-direction:column;
    width:100%; height:100%;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }

  #setup{
    position:absolute; inset:0; z-index:50;
    background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px; gap:14px;
  }
  #setup.hidden{display:none;}
  #setup h1{font-size:22px; letter-spacing:0.5px; margin:0 0 4px 0; color:var(--amber);}
  #setup p{color:var(--grey); font-size:13px; line-height:1.5; max-width:340px; text-align:center; margin:0;}
  #setup a{color:var(--amber);}
  #tokenInput{
    width:100%; max-width:340px; padding:14px; font-size:15px;
    background:var(--panel); border:1px solid var(--line); border-radius:8px;
    color:#eee; font-family:var(--font-num);
  }
  #startBtn{
    width:100%; max-width:340px; padding:16px; font-size:16px; font-weight:600;
    background:var(--amber); color:#000; border:none; border-radius:8px;
    letter-spacing:0.5px;
  }
  #startBtn:active{background:#cc7700;}
  #setupError{color:var(--red); font-size:13px; min-height:16px;}

  #contextBanner{
    display:none; background:#3a2200; color:var(--amber); font-size:12px;
    padding:8px 14px; text-align:center; border-bottom:1px solid var(--amber);
    flex-shrink:0;
  }
  #contextBanner.show{display:block;}

  #turnBanner{
    display:flex; align-items:center; gap:16px;
    background:var(--panel); border-bottom:1px solid var(--line);
    padding:14px 18px; flex-shrink:0;
  }
  #turnIcon{width:44px; height:44px; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  #turnIcon svg{width:36px; height:36px; stroke:var(--amber); fill:none; stroke-width:2.4;}
  #turnText{flex:1; min-width:0;}
  #turnDistance{font-family:var(--font-num); font-size:24px; color:var(--amber); font-weight:700; line-height:1;}
  #turnStreet{font-size:14px; color:var(--grey); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

  #mapWrap{flex:1; position:relative; min-height:0;}
  #map{position:absolute; inset:0;}
  #recenterBtn{
    position:absolute; bottom:16px; right:16px; z-index:10;
    width:48px; height:48px; border-radius:24px;
    background:rgba(20,20,20,0.9); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
  }
  #recenterBtn svg{width:24px; height:24px; stroke:var(--amber); fill:none; stroke-width:2;}

  #statusBar{display:flex; align-items:stretch; background:var(--panel); border-top:1px solid var(--line); flex-shrink:0;}
  .stat{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 4px; border-right:1px solid var(--line);}
  .stat:last-child{border-right:none;}
  .stat-value{font-family:var(--font-num); font-size:24px; font-weight:700; color:#eee; line-height:1;}
  .stat-label{font-size:9px; color:var(--grey); letter-spacing:1px; margin-top:5px; text-transform:uppercase;}
  #speedVal{color:var(--amber);}
  #speedVal.over{color:var(--red);}
  #limitVal{color:#eee;}

  #exitBtn{
    position:absolute; top:calc(env(safe-area-inset-top) + 8px); right:10px; z-index:20;
    width:30px; height:30px; border-radius:15px;
    background:rgba(20,20,20,0.7); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; color:var(--grey); font-size:14px;
  }
  #wakeIndicator{
    position:absolute; top:calc(env(safe-area-inset-top) + 8px); left:10px; z-index:20;
    font-size:10px; color:var(--grey); background:rgba(20,20,20,0.7);
    padding:4px 8px; border-radius:10px; border:1px solid var(--line);
  }
  #testBtn{
    position:absolute; top:calc(env(safe-area-inset-top) + 44px); left:10px; z-index:20;
    font-size:11px; color:var(--amber); background:rgba(20,20,20,0.85);
    padding:5px 10px; border-radius:10px; border:1px solid var(--amber-dim, #7a4a00);
  }
  #searchOverlay{
    position:absolute; inset:0; z-index:15; background:rgba(10,10,10,0.97);
    display:none; flex-direction:column; padding:16px; padding-top:calc(env(safe-area-inset-top) + 16px);
  }
  #searchOverlay.show{display:flex;}
  #destInput{width:100%; padding:14px; font-size:16px; background:var(--panel); border:1px solid var(--line); border-radius:8px; color:#eee; margin-bottom:10px;}
  #searchResults{flex:1; overflow-y:auto;}
  .result-item{padding:14px 10px; border-bottom:1px solid var(--line); font-size:14px;}
  .result-main{color:#eee;}
  .result-sub{color:var(--grey); font-size:12px; margin-top:2px;}
  #destBtn{
    position:absolute; top:calc(env(safe-area-inset-top) + 8px); left:50%; transform:translateX(-50%);
    z-index:20; background:rgba(20,20,20,0.85); border:1px solid var(--line);
    color:var(--grey); font-size:12px; padding:6px 14px; border-radius:14px;
  }
  .cam-marker{
    width:18px; height:18px; border-radius:4px; background:#ff3b30;
    border:2px solid #000; box-shadow:0 0 6px rgba(255,59,48,0.8);
    display:flex; align-items:center; justify-content:center; font-size:10px;
  }
</style>
</head>
<body>

<div id="setup">
  <h1>DASH SETUP</h1>
  <p>Paste a free Mapbox access token to enable the map. Get one at
    <a href="https://account.mapbox.com/access-tokens/" target="_blank">account.mapbox.com</a>
    (no card needed on the free tier). Saved on this device only.</p>
  <input id="tokenInput" placeholder="pk.eyJ1Ijoi..." autocomplete="off" autocapitalize="off" spellcheck="false">
  <button id="startBtn">Start</button>
  <div id="setupError"></div>
</div>

<div id="app">
  <div id="contextBanner"></div>
  <div id="turnBanner">
    <div id="turnIcon"><svg viewBox="0 0 24 24"><path id="turnArrow" d="M12 19V5M12 5l-6 6M12 5l6 6"/></svg></div>
    <div id="turnText">
      <div id="turnDistance">--</div>
      <div id="turnStreet">Enter a destination to start</div>
    </div>
  </div>

  <div id="mapWrap">
    <div id="map"></div>
    <button id="destBtn">Set destination</button>
    <button id="testBtn">Test route: NP19 4AN</button>
    <button id="exitBtn">✕</button>
    <div id="wakeIndicator">screen: on</div>
    <button id="recenterBtn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg></button>

    <div id="searchOverlay">
      <input id="destInput" placeholder="Where to?" autocomplete="off">
      <div id="searchResults"></div>
    </div>
  </div>

  <div id="statusBar">
    <div class="stat"><div class="stat-value" id="speedVal">0</div><div class="stat-label">mph</div></div>
    <div class="stat"><div class="stat-value" id="limitVal">--</div><div class="stat-label">limit</div></div>
    <div class="stat"><div class="stat-value" id="etaVal">--:--</div><div class="stat-label">ETA</div></div>
    <div class="stat"><div class="stat-value" id="distVal">--</div><div class="stat-label">remaining</div></div>
  </div>
</div>

<script>
let map, userMarker, wakeLock = null, watchId = null;
let destCoords = null;
let lastRouteFetch = 0;
const ROUTE_REFETCH_MS = 8000;
let pendingRouteData = null;
let camerasLoadedForBounds = null;
const TOKEN_KEY = 'dash_mapbox_token';

// ---- SETUP ----
const setupEl = document.getElementById('setup');
const tokenInput = document.getElementById('tokenInput');
const savedToken = localStorage.getItem(TOKEN_KEY);
if (savedToken) tokenInput.value = savedToken;

document.getElementById('startBtn').onclick = () => {
  const token = tokenInput.value.trim();
  const err = document.getElementById('setupError');
  if (!token.startsWith('pk.')) {
    err.textContent = 'That doesn\'t look like a Mapbox public token (starts with "pk.").';
    return;
  }
  localStorage.setItem(TOKEN_KEY, token);
  err.textContent = '';
  setupEl.classList.add('hidden');
  if (!map) initApp(token);
};

document.getElementById('exitBtn').onclick = () => setupEl.classList.remove('hidden');

function checkSecureContext() {
  const insecure = location.protocol === 'file:' ||
    (location.protocol === 'http:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1');
  const banner = document.getElementById('contextBanner');
  if (insecure) {
    banner.textContent = 'Running over ' + location.protocol + ' — GPS and wake lock are blocked without HTTPS. Host this on GitHub Pages before testing in the car.';
    banner.classList.add('show');
  }
  return !insecure;
}

function initApp(token) {
  mapboxgl.accessToken = token;
  const secure = checkSecureContext();

  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [-3.0000, 51.5880], // Newport default
    zoom: 15,
    pitch: 60,
    attributionControl: false
  });

  map.on('error', (e) => {
    document.getElementById('turnStreet').textContent = 'Map error: ' + (e.error ? e.error.message : 'unknown');
  });

  map.on('load', () => {
    map.addSource('route', { type: 'geojson', data: { type:'Feature', geometry:{type:'LineString', coordinates:[]} } });
    map.addLayer({
      id: 'route-line', type: 'line', source: 'route',
      layout: { 'line-join':'round', 'line-cap':'round' },
      paint: { 'line-color':'#ff9500', 'line-width':6, 'line-opacity':0.85 }
    });
    map.addSource('cameras', { type: 'geojson', data: { type:'FeatureCollection', features:[] } });
    map.addLayer({
      id: 'camera-points', type: 'circle', source: 'cameras',
      paint: { 'circle-radius':7, 'circle-color':'#ff3b30', 'circle-stroke-width':2, 'circle-stroke-color':'#000' }
    });
    if (pendingRouteData) { map.getSource('route').setData(pendingRouteData); pendingRouteData = null; }
    fetchCamerasInView();
  });

  map.on('moveend', () => {
    if (map.getZoom() >= 13) fetchCamerasInView();
  });

  const el = document.createElement('div');
  el.style.width = '18px'; el.style.height = '18px'; el.style.borderRadius = '50%';
  el.style.background = '#ff9500'; el.style.border = '3px solid #000';
  el.style.boxShadow = '0 0 10px rgba(255,149,0,0.8)';
  userMarker = new mapboxgl.Marker({ element: el }).setLngLat([-3.0000, 51.5880]).addTo(map);

  if (secure) {
    startTracking();
    requestWakeLock();
  } else {
    document.getElementById('turnStreet').textContent = 'Waiting for HTTPS host to enable GPS...';
  }
}

// ---- GEOLOCATION + SPEED ----
function startTracking() {
  if (!navigator.geolocation) {
    document.getElementById('turnStreet').textContent = 'Geolocation not available on this device.';
    return;
  }
  watchId = navigator.geolocation.watchPosition(onPosition, onPosError, {
    enableHighAccuracy: true, maximumAge: 1000, timeout: 10000
  });
}

function onPosition(pos) {
  const { longitude, latitude, speed, heading } = pos.coords;
  userMarker.setLngLat([longitude, latitude]);
  map.easeTo({ center: [longitude, latitude], bearing: heading || map.getBearing(), duration: 800 });

  const mph = speed ? Math.max(0, Math.round(speed * 2.23694)) : 0;
  const speedEl = document.getElementById('speedVal');
  speedEl.textContent = mph;

  if (destCoords) {
    const now = Date.now();
    if (now - lastRouteFetch > ROUTE_REFETCH_MS) {
      lastRouteFetch = now;
      updateRoute([longitude, latitude], destCoords);
    }
  }
}

function onPosError(err) {
  document.getElementById('turnStreet').textContent = 'Location error: ' + err.message +
    (err.code === 1 ? ' — check Settings > Privacy > Location Services for Safari.' : '');
}

// ---- ROUTING ----
async function updateRoute(origin, dest) {
  const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${origin[0]},${origin[1]};${dest[0]},${dest[1]}?geometries=geojson&overview=full&steps=true&annotations=maxspeed&access_token=${mapboxgl.accessToken}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!data.routes || !data.routes.length) {
      document.getElementById('turnStreet').textContent = 'No route found: ' + (data.message || 'try a different destination');
      return;
    }
    const route = data.routes[0];
    const setData = () => map.getSource('route').setData({ type:'Feature', geometry: route.geometry });
    if (map.getSource('route')) setData(); else pendingRouteData = { type:'Feature', geometry: route.geometry };

    const step = route.legs[0].steps[0];
    if (step) {
      document.getElementById('turnDistance').textContent = formatDist(step.distance);
      document.getElementById('turnStreet').textContent = step.maneuver.instruction;
      setTurnIcon(step.maneuver.modifier || step.maneuver.type);
    }

    // speed limit from the annotation at the start of the route (current road)
    const ann = route.legs[0].annotation;
    const limitEl = document.getElementById('limitVal');
    if (ann && ann.maxspeed && ann.maxspeed.length) {
      const ms = ann.maxspeed[0];
      if (ms && !ms.unknown && ms.speed) {
        limitEl.textContent = ms.speed;
        checkSpeedVsLimit(ms.speed, ms.unit);
      } else {
        limitEl.textContent = '--';
      }
    }

    document.getElementById('distVal').textContent = formatDist(route.distance);
    const eta = new Date(Date.now() + route.duration * 1000);
    document.getElementById('etaVal').textContent =
      eta.getHours().toString().padStart(2,'0') + ':' + eta.getMinutes().toString().padStart(2,'0');
  } catch (e) {
    document.getElementById('turnStreet').textContent = 'Route request failed: ' + e.message;
  }
}

function checkSpeedVsLimit(limit, unit) {
  const speedEl = document.getElementById('speedVal');
  const current = parseInt(speedEl.textContent, 10) || 0;
  const limitMph = unit === 'km/h' ? Math.round(limit * 0.621371) : limit;
  if (current > limitMph + 2) speedEl.classList.add('over'); else speedEl.classList.remove('over');
}

function formatDist(meters) {
  const miles = meters / 1609.34;
  return miles < 0.1 ? Math.round(meters) + 'm' : miles.toFixed(1) + 'mi';
}

function setTurnIcon(modifier) {
  const arrow = document.getElementById('turnArrow');
  const paths = {
    'left': 'M19 12H5M5 12l6-6M5 12l6 6',
    'right': 'M5 12h14M19 12l-6-6M19 12l-6 6',
    'straight': 'M12 19V5M12 5l-6 6M12 5l6 6',
    'slight left': 'M19 17L9 7M9 7v7M9 7h7',
    'slight right': 'M5 17L15 7M15 7v7M15 7H8',
    'uturn': 'M8 5v8a4 4 0 0 0 8 0V9M16 9l3 3M16 9l-3 3'
  };
  arrow.setAttribute('d', paths[modifier] || paths['straight']);
}

// ---- SPEED CAMERAS (OpenStreetMap via Overpass) ----
async function fetchCamerasInView() {
  if (!map) return;
  const b = map.getBounds();
  const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
  if (camerasLoadedForBounds === bbox) return;
  camerasLoadedForBounds = bbox;
  const query = `[out:json][timeout:15];node["highway"="speed_camera"](${bbox});out body;`;
  try {
    const res = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      body: 'data=' + encodeURIComponent(query)
    });
    const data = await res.json();
    const features = (data.elements || []).map(n => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [n.lon, n.lat] },
      properties: { id: n.id }
    }));
    if (map.getSource('cameras')) {
      map.getSource('cameras').setData({ type: 'FeatureCollection', features });
    }
  } catch (e) {
    console.error('camera fetch failed', e);
  }
}

// ---- DESTINATION SEARCH ----
document.getElementById('destBtn').onclick = () => {
  document.getElementById('searchOverlay').classList.add('show');
  document.getElementById('destInput').focus();
};

let searchTimeout;
document.getElementById('destInput').oninput = (e) => {
  clearTimeout(searchTimeout);
  const q = e.target.value.trim();
  if (q.length < 3) { document.getElementById('searchResults').innerHTML = ''; return; }
  searchTimeout = setTimeout(() => searchPlaces(q), 350);
};

async function searchPlaces(query) {
  const center = userMarker ? userMarker.getLngLat() : { lng:-3.0000, lat:51.5880 };
  const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?proximity=${center.lng},${center.lat}&country=gb&access_token=${mapboxgl.accessToken}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    const list = document.getElementById('searchResults');
    list.innerHTML = '';
    (data.features || []).forEach(f => {
      const div = document.createElement('div');
      div.className = 'result-item';
      div.innerHTML = `<div class="result-main">${f.text}</div><div class="result-sub">${f.place_name}</div>`;
      div.onclick = () => selectDestination(f.center);
      list.appendChild(div);
    });
    if (!data.features || !data.features.length) {
      list.innerHTML = '<div class="result-item result-sub">No results.</div>';
    }
  } catch (e) {
    document.getElementById('searchResults').innerHTML = '<div class="result-item result-sub">Search failed: ' + e.message + '</div>';
  }
}

function selectDestination(center) {
  destCoords = center;
  document.getElementById('searchOverlay').classList.remove('show');
  document.getElementById('destInput').value = '';
  document.getElementById('searchResults').innerHTML = '';
  lastRouteFetch = Date.now();
  const pos = userMarker.getLngLat();
  updateRoute([pos.lng, pos.lat], destCoords);
}

// quick test button: geocode NP19 4AN and route to it from current (or default) position
document.getElementById('testBtn').onclick = async () => {
  document.getElementById('turnStreet').textContent = 'Looking up NP19 4AN...';
  const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/NP19%204AN.json?country=gb&types=postcode&access_token=${mapboxgl.accessToken}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.features && data.features.length) {
      selectDestination(data.features[0].center);
    } else {
      document.getElementById('turnStreet').textContent = 'Postcode lookup returned nothing.';
    }
  } catch (e) {
    document.getElementById('turnStreet').textContent = 'Postcode lookup failed: ' + e.message;
  }
};

document.getElementById('recenterBtn').onclick = () => {
  if (!userMarker || !map) return;
  const pos = userMarker.getLngLat();
  map.easeTo({ center: pos, zoom: 16, duration: 500 });
};

// ---- WAKE LOCK ----
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById('wakeIndicator').textContent = 'screen: locked';
      wakeLock.addEventListener('release', () => {
        document.getElementById('wakeIndicator').textContent = 'screen: released';
      });
    } else {
      document.getElementById('wakeIndicator').textContent = 'wake lock unsupported';
    }
  } catch (e) {
    document.getElementById('wakeIndicator').textContent = 'screen: lock failed';
  }
}

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && !wakeLock && map) requestWakeLock();
});
</script>
</body>
</html>
