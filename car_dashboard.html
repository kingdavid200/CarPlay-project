<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>Dash</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/mapbox-gl/2.15.0/mapbox-gl.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mapbox-gl/2.15.0/mapbox-gl.js"></script>
<style>
  :root{
    --bg:#0a0a0a; --panel:#141414; --amber:#ff9500; --amber-dim:#7a4a00;
    --red:#ff3b30; --grey:#8a8a8a; --line:#2a2a2a;
    --font-num: 'Courier New', ui-monospace, monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0; padding:0; width:100%; height:100%; background:var(--bg); color:#eee;
    font-family:-apple-system, system-ui, sans-serif; overflow:hidden; position:fixed; inset:0;}
  #app{display:flex; flex-direction:column; width:100%; height:100%;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);}

  #setup{position:absolute; inset:0; z-index:50; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; gap:14px;}
  #setup.hidden{display:none;}
  #setup h1{font-size:22px; letter-spacing:0.5px; margin:0 0 4px 0; color:var(--amber);}
  #setup p{color:var(--grey); font-size:13px; line-height:1.5; max-width:340px; text-align:center; margin:0;}
  #setup a{color:var(--amber);}
  #tokenInput{width:100%; max-width:340px; padding:14px; font-size:15px; background:var(--panel);
    border:1px solid var(--line); border-radius:8px; color:#eee; font-family:var(--font-num);}
  #startBtn{width:100%; max-width:340px; padding:16px; font-size:16px; font-weight:600;
    background:var(--amber); color:#000; border:none; border-radius:8px; letter-spacing:0.5px;}
  #startBtn:active{background:#cc7700;}
  #setupError{color:var(--red); font-size:13px; min-height:16px;}

  #contextBanner{display:none; background:#3a2200; color:var(--amber); font-size:12px;
    padding:8px 14px; text-align:center; border-bottom:1px solid var(--amber); flex-shrink:0;}
  #contextBanner.show{display:block;}

  #turnBanner{display:flex; flex-direction:column; gap:8px; background:var(--panel);
    border-bottom:1px solid var(--line); padding:14px 18px; flex-shrink:0;}
  #turnMain{display:flex; align-items:center; gap:16px;}
  #turnIcon{width:44px; height:44px; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  #turnIcon svg{width:36px; height:36px; stroke:var(--amber); fill:none; stroke-width:2.4;}
  #turnText{flex:1; min-width:0;}
  #turnDistance{font-family:var(--font-num); font-size:24px; color:var(--amber); font-weight:700; line-height:1;}
  #turnStreet{font-size:14px; color:var(--grey); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  #laneRow{display:flex; gap:6px; padding-left:60px;}
  .lane-icon{width:26px; height:26px; opacity:0.3; display:flex; align-items:center; justify-content:center;}
  .lane-icon.valid{opacity:1;}
  .lane-icon svg{width:22px; height:22px; stroke:var(--grey); fill:none; stroke-width:2.5;}
  .lane-icon.valid svg{stroke:var(--amber);}

  #mapWrap{flex:1; position:relative; min-height:0;}
  #mapInner{position:absolute; inset:0;}
  #map{position:absolute; inset:0;}
  #recenterBtn{position:absolute; bottom:16px; right:16px; z-index:10; width:48px; height:48px; border-radius:24px;
    background:rgba(20,20,20,0.9); border:1px solid var(--line); display:flex; align-items:center; justify-content:center;}
  #recenterBtn svg{width:24px; height:24px; stroke:var(--amber); fill:none; stroke-width:2;}

  #satToggle{position:absolute; bottom:16px; right:72px; z-index:10; width:48px; height:48px; border-radius:24px;
    background:rgba(20,20,20,0.9); border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
    font-size:10px; color:var(--grey); font-weight:700;}
  #satToggle.on{color:var(--amber); border-color:var(--amber-dim);}

  #statusBar{display:flex; align-items:stretch; background:var(--panel); border-top:1px solid var(--line); flex-shrink:0;}
  .stat{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 4px; border-right:1px solid var(--line);}
  .stat:last-child{border-right:none;}
  .stat-value{font-family:var(--font-num); font-size:24px; font-weight:700; color:#eee; line-height:1;}
  .stat-label{font-size:9px; color:var(--grey); letter-spacing:1px; margin-top:5px; text-transform:uppercase;}
  #speedVal{color:var(--amber);}
  #speedVal.over{color:var(--red);}

  #limitSign{width:44px; height:44px; border-radius:50%; background:#fff; border:4px solid #cc0000;
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:16px; color:#111;
    font-family:Arial, sans-serif;}
  #limitSign.none{background:#333; border-color:var(--line); color:var(--grey); font-size:10px;}

  #exitBtn{position:absolute; top:calc(env(safe-area-inset-top) + 8px); right:10px; z-index:20; width:30px; height:30px;
    border-radius:15px; background:rgba(20,20,20,0.7); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; color:var(--grey); font-size:14px;}
  #wakeIndicator{position:absolute; top:calc(env(safe-area-inset-top) + 8px); left:10px; z-index:20; font-size:10px;
    color:var(--grey); background:rgba(20,20,20,0.7); padding:4px 8px; border-radius:10px; border:1px solid var(--line);}
  #testBtn{position:absolute; top:calc(env(safe-area-inset-top) + 44px); left:10px; z-index:20; font-size:11px;
    color:var(--amber); background:rgba(20,20,20,0.85); padding:5px 10px; border-radius:10px; border:1px solid var(--amber-dim);}
  #voiceToggle{position:absolute; top:calc(env(safe-area-inset-top) + 80px); left:10px; z-index:20; font-size:11px;
    color:var(--grey); background:rgba(20,20,20,0.85); padding:5px 10px; border-radius:10px; border:1px solid var(--line);}
  #voiceToggle.on{color:var(--amber); border-color:var(--amber-dim);}

  #infoPanel{position:absolute; top:calc(env(safe-area-inset-top) + 8px); right:48px; z-index:20;
    display:flex; gap:6px;}
  .info-pill{background:rgba(20,20,20,0.85); border:1px solid var(--line); border-radius:10px;
    padding:5px 9px; font-size:11px; color:#ddd; display:flex; align-items:center; gap:4px;}
  #battPill.low{color:var(--red); border-color:#5a1a1a;}

  #searchOverlay{position:absolute; inset:0; z-index:15; background:rgba(10,10,10,0.97); display:none;
    flex-direction:column; padding:16px; padding-top:calc(env(safe-area-inset-top) + 16px);}
  #searchOverlay.show{display:flex;}
  #destInput{width:100%; padding:14px; font-size:16px; background:var(--panel); border:1px solid var(--line);
    border-radius:8px; color:#eee; margin-bottom:10px;}
  #searchResults{flex:1; overflow-y:auto; min-height:0;}
  .result-item{padding:14px 10px; border-bottom:1px solid var(--line); font-size:14px;}
  .result-main{color:#eee;}
  .result-sub{color:var(--grey); font-size:12px; margin-top:2px;}
  #stopsChips{display:flex; flex-wrap:wrap; gap:6px; padding:10px 0; flex-shrink:0;}
  .stop-chip{background:var(--panel); border:1px solid var(--amber-dim); color:var(--amber);
    font-size:12px; padding:6px 10px; border-radius:14px; display:flex; align-items:center; gap:6px;}
  .stop-chip .remove{color:var(--grey); font-weight:700;}
  #previewBtn{width:100%; padding:14px; background:var(--amber); color:#000; border:none;
    border-radius:8px; font-weight:700; font-size:15px; flex-shrink:0; margin-top:8px;}
  #previewBtn:disabled{background:#333; color:var(--grey);}
  #destBtn{position:absolute; top:calc(env(safe-area-inset-top) + 8px); left:50%; transform:translateX(-50%); z-index:20;
    background:rgba(20,20,20,0.85); border:1px solid var(--line); color:var(--grey); font-size:12px; padding:6px 14px; border-radius:14px;}

  #tripSummary{position:absolute; left:12px; right:12px; top:12px; z-index:14;
    background:rgba(18,18,18,0.9); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:14px; display:none; flex-direction:column; gap:10px;}
  #tripSummary.show{display:flex;}
  #tripSummaryTop{display:flex; justify-content:space-between; align-items:baseline;}
  #tripSummaryTime{font-family:var(--font-num); font-size:22px; color:var(--amber); font-weight:700;}
  #tripSummaryDist{font-size:13px; color:var(--grey);}
  #tripSummaryStops{font-size:12px; color:var(--grey);}
  #tripButtons{display:flex; gap:10px;}
  #goBtn{flex:1; padding:12px; background:var(--amber); color:#000; border:none; border-radius:10px; font-weight:700;}
  #endTripBtn{flex:1; padding:12px; background:rgba(255,59,48,0.15); color:var(--red); border:1px solid #5a1a1a; border-radius:10px; font-weight:700; display:none;}
  #endTripBtn.show{display:block;}
  #goBtn.hidden{display:none;}

  #musicPanel{position:absolute; left:12px; right:12px; bottom:12px; z-index:12;
    background:rgba(18,18,18,0.72); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.08); border-radius:18px; box-shadow:0 8px 24px rgba(0,0,0,0.45);
    display:flex; align-items:center; gap:14px; padding:12px 14px;}
  #musicArtWrap{width:56px; height:56px; border-radius:12px; overflow:hidden; flex-shrink:0; position:relative;
    background:linear-gradient(135deg,#2a2a2a,#111); box-shadow:0 3px 10px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.06);}
  #musicArtWrap.playing{box-shadow:0 3px 14px rgba(255,149,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.1);}
  #musicArt{width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    color:rgba(255,255,255,0.5); font-size:9px; text-align:center; line-height:1.3;}
  #musicInfo{flex:1; min-width:0; display:flex; flex-direction:column; gap:4px;}
  #musicTrack{font-size:14px; font-weight:600; color:#f2f2f2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  #musicArtist{font-size:12px; color:var(--grey); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  #musicProgress{width:100%; height:3px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; margin-top:2px;}
  #musicProgressFill{height:100%; width:0%; background:var(--amber); border-radius:2px;}
  #musicProgressFill.playing{animation:progress 28s linear infinite;}
  @keyframes progress{from{width:0%;} to{width:100%;}}
  #musicEq{display:flex; align-items:flex-end; gap:3px; height:16px; position:absolute; top:6px; right:8px;}
  #musicEq span{width:2.5px; background:var(--amber); border-radius:2px; height:3px; opacity:0;}
  #musicEq.playing span{opacity:0.9; animation:eq 0.9s ease-in-out infinite;}
  #musicEq span:nth-child(1){animation-delay:0s;}
  #musicEq span:nth-child(2){animation-delay:0.15s;}
  #musicEq span:nth-child(3){animation-delay:0.3s;}
  #musicEq span:nth-child(4){animation-delay:0.45s;}
  @keyframes eq{0%,100%{height:3px;} 50%{height:15px;}}
  #musicControls{display:flex; gap:6px; align-items:center; flex-shrink:0;}
  .music-btn{width:34px; height:34px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .music-btn svg{width:20px; height:20px; fill:#ddd;}
  #playBtn{width:44px; height:44px; border-radius:50%; background:var(--amber);
    box-shadow:0 3px 10px rgba(255,149,0,0.4);}
  #playBtn svg{width:22px; height:22px; fill:#000;}
</style>
</head>
<body>

<div id="setup">
  <h1>DASH SETUP</h1>
  <p>Paste a free Mapbox access token to enable the map. Get one at
    <a href="https://account.mapbox.com/access-tokens/" target="_blank">account.mapbox.com</a>
    (no card needed on the free tier). Saved on this device only.</p>
  <input id="tokenInput" placeholder="pk.eyJ1Ijoi..." autocomplete="off" autocapitalize="off" spellcheck="false">
  <button id="startBtn">Start</button>
  <div id="setupError"></div>
</div>

<div id="app">
  <div id="contextBanner"></div>
  <div id="turnBanner">
    <div id="turnMain">
      <div id="turnIcon"><svg viewBox="0 0 24 24"><path id="turnArrow" d="M12 19V5M12 5l-6 6M12 5l6 6"/></svg></div>
      <div id="turnText">
        <div id="turnDistance">--</div>
        <div id="turnStreet">Tap "Plan trip" to add stops</div>
      </div>
    </div>
    <div id="laneRow"></div>
  </div>

  <div id="mapWrap">
    <div id="mapInner">
      <div id="map"></div>
      <button id="destBtn">Plan trip</button>
      <button id="voiceToggle">voice: off</button>
      <div id="infoPanel">
        <div class="info-pill" id="weatherPill">--</div>
        <div class="info-pill" id="battPill">batt --</div>
      </div>
      <button id="exitBtn">✕</button>
      <div id="wakeIndicator">screen: on</div>
      <button id="satToggle">SAT</button>
      <button id="recenterBtn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg></button>

      <div id="tripSummary">
        <div id="tripSummaryTop">
          <div id="tripSummaryTime">--</div>
          <div id="tripSummaryDist">--</div>
        </div>
        <div id="tripSummaryStops">--</div>
        <div id="tripButtons">
          <button id="goBtn">GO</button>
          <button id="endTripBtn">END TRIP</button>
        </div>
      </div>

      <div id="searchOverlay">
        <input id="destInput" placeholder="Add a stop..." autocomplete="off">
        <div id="stopsChips"></div>
        <div id="searchResults"></div>
        <button id="previewBtn" disabled>Preview trip</button>
      </div>
    </div>

    <div id="musicPanel">
      <div id="musicArtWrap"><div id="musicArt">NO<br>ART</div></div>
      <div id="musicInfo">
        <div id="musicTrack">Nothing queued</div>
        <div id="musicArtist">tap play</div>
        <div id="musicProgress"><div id="musicProgressFill"></div></div>
      </div>
      <div id="musicEq"><span></span><span></span><span></span><span></span></div>
      <div id="musicControls">
        <button class="music-btn" id="prevBtn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <button class="music-btn" id="playBtn"><svg viewBox="0 0 24 24"><path id="playIcon" d="M8 5v14l11-7z"/></svg></button>
        <button class="music-btn" id="nextBtn"><svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg></button>
      </div>
    </div>
  </div>

  <div id="statusBar">
    <div class="stat"><div class="stat-value" id="speedVal">0</div><div class="stat-label">mph</div></div>
    <div class="stat"><div id="limitSign" class="none">--</div><div class="stat-label">limit</div></div>
    <div class="stat"><div class="stat-value" id="etaVal">--:--</div><div class="stat-label">ETA</div></div>
    <div class="stat"><div class="stat-value" id="distVal">--</div><div class="stat-label">remaining</div></div>
  </div>
</div>

<script>
let map, userMarker, wakeLock = null, watchId = null;
let lastRouteFetch = 0;
const ROUTE_REFETCH_MS = 8000;
let pendingRouteData = null;
let camerasLoadedForBounds = null;
let voiceOn = false;
let lastSpokenInstruction = '';
let satOn = false;
let navigating = false;
let tripStops = []; // [{name, center:[lng,lat]}]
let lastPos = null;
const TOKEN_KEY = 'dash_mapbox_token';
const VOICE_KEY = 'dash_voice_on';

// ---- SETUP ----
const setupEl = document.getElementById('setup');
const tokenInput = document.getElementById('tokenInput');
const savedToken = localStorage.getItem(TOKEN_KEY);
if (savedToken) tokenInput.value = savedToken;
voiceOn = localStorage.getItem(VOICE_KEY) === '1';
updateVoiceBtn();

document.getElementById('startBtn').onclick = () => {
  const token = tokenInput.value.trim();
  const err = document.getElementById('setupError');
  if (!token.startsWith('pk.')) { err.textContent = 'That doesn\'t look like a Mapbox public token (starts with "pk.").'; return; }
  localStorage.setItem(TOKEN_KEY, token);
  err.textContent = '';
  setupEl.classList.add('hidden');
  if (!map) initApp(token);
};
document.getElementById('exitBtn').onclick = () => setupEl.classList.remove('hidden');

document.getElementById('voiceToggle').onclick = () => {
  voiceOn = !voiceOn;
  localStorage.setItem(VOICE_KEY, voiceOn ? '1' : '0');
  updateVoiceBtn();
  if (voiceOn) speak('Voice guidance on.');
};
function updateVoiceBtn() {
  const btn = document.getElementById('voiceToggle');
  btn.textContent = voiceOn ? 'voice: on' : 'voice: off';
  btn.classList.toggle('on', voiceOn);
}
function speak(text) {
  if (!voiceOn || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.0; u.lang = 'en-GB';
  window.speechSynthesis.speak(u);
}

function checkSecureContext() {
  const insecure = location.protocol === 'file:' ||
    (location.protocol === 'http:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1');
  const banner = document.getElementById('contextBanner');
  if (insecure) {
    banner.textContent = 'Running over ' + location.protocol + ' — GPS and wake lock are blocked without HTTPS.';
    banner.classList.add('show');
  }
  return !insecure;
}

// ---- MAP LAYERS (re-added on every style load, since setStyle wipes custom layers) ----
function addMapLayers() {
  if (!map.getSource('route')) {
    map.addSource('route', { type: 'geojson', data: { type:'Feature', geometry:{type:'LineString', coordinates:[]} } });
  }
  if (!map.getLayer('route-line')) {
    map.addLayer({ id: 'route-line', type: 'line', source: 'route',
      layout: { 'line-join':'round', 'line-cap':'round' },
      paint: { 'line-color':'#ff9500', 'line-width':6, 'line-opacity':0.85 } });
  }
  if (map.getSource('composite') && !map.getLayer('3d-buildings')) {
    map.addLayer({
      id: '3d-buildings', source: 'composite', 'source-layer': 'building',
      filter: ['==', 'extrude', 'true'], type: 'fill-extrusion', minzoom: 13,
      paint: {
        'fill-extrusion-color': '#2c2c2c',
        'fill-extrusion-height': ['coalesce', ['get', 'height'], 10],
        'fill-extrusion-base': ['coalesce', ['get', 'min_height'], 0],
        'fill-extrusion-opacity': 0.75
      }
    });
  }
  if (!map.hasImage('camera-icon')) {
    const camSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="11" fill="#ff3b30" stroke="#000" stroke-width="1.5"/>
      <rect x="5" y="8" width="14" height="9" rx="1.5" fill="#111"/>
      <circle cx="12" cy="12.5" r="3" fill="#ff9500"/>
      <rect x="8" y="6" width="4" height="2.5" fill="#111"/>
    </svg>`;
    const camImg = new Image(40, 40);
    camImg.onload = () => { if (!map.hasImage('camera-icon')) map.addImage('camera-icon', camImg); };
    camImg.src = 'data:image/svg+xml;base64,' + btoa(camSvg);
  }
  if (!map.getSource('cameras')) {
    map.addSource('cameras', { type: 'geojson', data: { type:'FeatureCollection', features:[] } });
  }
  if (!map.getLayer('camera-points')) {
    map.addLayer({ id: 'camera-points', type: 'symbol', source: 'cameras',
      layout: { 'icon-image': 'camera-icon', 'icon-size': 0.6, 'icon-allow-overlap': true } });
  }
  if (pendingRouteData && map.getSource('route')) { map.getSource('route').setData(pendingRouteData); pendingRouteData = null; }
  fetchCamerasInView();
}

function initApp(token) {
  mapboxgl.accessToken = token;
  const secure = checkSecureContext();

  map = new mapboxgl.Map({
    container: 'map', style: 'mapbox://styles/mapbox/dark-v11',
    center: [-3.0000, 51.5880], zoom: 15, pitch: 60, attributionControl: false
  });

  map.on('error', (e) => { document.getElementById('turnStreet').textContent = 'Map error: ' + (e.error ? e.error.message : 'unknown'); });
  map.on('load', addMapLayers);
  map.on('style.load', () => { if (map.isStyleLoaded()) addMapLayers(); else map.once('idle', addMapLayers); });
  map.on('moveend', () => { if (map.getZoom() >= 13) fetchCamerasInView(); });

  const el = document.createElement('div');
  el.style.width = '18px'; el.style.height = '18px'; el.style.borderRadius = '50%';
  el.style.background = '#ff9500'; el.style.border = '3px solid #000'; el.style.boxShadow = '0 0 10px rgba(255,149,0,0.8)';
  userMarker = new mapboxgl.Marker({ element: el }).setLngLat([-3.0000, 51.5880]).addTo(map);

  if (secure) { startTracking(); requestWakeLock(); }
  else { document.getElementById('turnStreet').textContent = 'Waiting for HTTPS host to enable GPS...'; }
}

document.getElementById('satToggle').onclick = () => {
  satOn = !satOn;
  document.getElementById('satToggle').classList.toggle('on', satOn);
  map.setStyle(satOn ? 'mapbox://styles/mapbox/satellite-streets-v12' : 'mapbox://styles/mapbox/dark-v11');
};

function startTracking() {
  if (!navigator.geolocation) { document.getElementById('turnStreet').textContent = 'Geolocation not available on this device.'; return; }
  watchId = navigator.geolocation.watchPosition(onPosition, onPosError, { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 });
}

function haversine(a, b) {
  const R = 6371000, toRad = d => d * Math.PI / 180;
  const dLat = toRad(b[1] - a[1]), dLon = toRad(b[0] - a[0]);
  const s = Math.sin(dLat/2)**2 + Math.cos(toRad(a[1])) * Math.cos(toRad(b[1])) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

function onPosition(pos) {
  const { longitude, latitude, speed, heading } = pos.coords;
  lastPos = [longitude, latitude];
  userMarker.setLngLat(lastPos);
  map.easeTo({ center: lastPos, bearing: heading || map.getBearing(), duration: 800 });
  const mph = speed ? Math.max(0, Math.round(speed * 2.23694)) : 0;
  document.getElementById('speedVal').textContent = mph;
  updateSpeedColor(mph);
  fetchWeatherIfNeeded(latitude, longitude);

  if (navigating && tripStops.length) {
    if (haversine(lastPos, tripStops[0].center) < 40) {
      tripStops.shift();
      if (!tripStops.length) { finishTrip(); return; }
    }
    const now = Date.now();
    if (now - lastRouteFetch > ROUTE_REFETCH_MS) { lastRouteFetch = now; updateRoute(lastPos, tripStops.map(s => s.center)); }
  }
}
function onPosError(err) {
  document.getElementById('turnStreet').textContent = 'Location error: ' + err.message +
    (err.code === 1 ? ' — check Settings > Privacy > Location Services for Safari.' : '');
}

let currentLimitMph = null;
function updateSpeedColor(mph) {
  const speedEl = document.getElementById('speedVal');
  if (currentLimitMph != null && mph > currentLimitMph + 2) speedEl.classList.add('over');
  else speedEl.classList.remove('over');
}

// ---- WEATHER + BATTERY ----
let lastWeatherFetch = 0;
async function fetchWeatherIfNeeded(lat, lon) {
  const now = Date.now();
  if (now - lastWeatherFetch < 10 * 60 * 1000) return;
  lastWeatherFetch = now;
  try {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code`);
    const data = await res.json();
    const t = Math.round(data.current.temperature_2m);
    const code = data.current.weather_code;
    document.getElementById('weatherPill').textContent = weatherIcon(code) + ' ' + t + '°C';
  } catch (e) { document.getElementById('weatherPill').textContent = 'wx n/a'; }
}
function weatherIcon(code) {
  if (code === 0) return '☀';
  if (code <= 2) return '⛅';
  if (code === 3) return '☁';
  if (code >= 45 && code <= 48) return '🌫';
  if (code >= 51 && code <= 67) return '🌧';
  if (code >= 71 && code <= 77) return '❄';
  if (code >= 80 && code <= 82) return '🌦';
  if (code >= 95) return '⛈';
  return '—';
}
if ('getBattery' in navigator) {
  navigator.getBattery().then(batt => {
    const update = () => {
      const pct = Math.round(batt.level * 100);
      const el = document.getElementById('battPill');
      el.textContent = (batt.charging ? '⚡' : '') + pct + '%';
      el.classList.toggle('low', pct <= 20 && !batt.charging);
    };
    update();
    batt.addEventListener('levelchange', update);
    batt.addEventListener('chargingchange', update);
  }).catch(() => { document.getElementById('battPill').textContent = 'batt n/a'; });
} else {
  document.getElementById('battPill').textContent = 'batt n/a'; // iOS Safari doesn't expose this API
}

// ---- ROUTING (supports multiple ordered stops) ----
async function updateRoute(origin, destsArray) {
  const coords = [origin, ...destsArray].map(c => c[0] + ',' + c[1]).join(';');
  const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${coords}?geometries=geojson&overview=full&steps=true&annotations=maxspeed&access_token=${mapboxgl.accessToken}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!data.routes || !data.routes.length) { document.getElementById('turnStreet').textContent = 'No route found: ' + (data.message || 'try different stops'); return null; }
    const route = data.routes[0];
    const setData = () => map.getSource('route').setData({ type:'Feature', geometry: route.geometry });
    if (map.getSource('route')) setData(); else pendingRouteData = { type:'Feature', geometry: route.geometry };

    if (navigating) {
      const step = route.legs[0].steps[0];
      if (step) {
        document.getElementById('turnDistance').textContent = formatDist(step.distance);
        document.getElementById('turnStreet').textContent = step.maneuver.instruction;
        setTurnIcon(step.maneuver.modifier || step.maneuver.type);
        renderLanes(step);
        if (step.maneuver.instruction !== lastSpokenInstruction) {
          lastSpokenInstruction = step.maneuver.instruction;
          speak(step.maneuver.instruction);
        }
      }
      const ann = route.legs[0].annotation;
      const limitEl = document.getElementById('limitSign');
      if (ann && ann.maxspeed && ann.maxspeed.length) {
        const ms = ann.maxspeed[0];
        if (ms && !ms.unknown && ms.speed) {
          const limitMph = ms.unit === 'km/h' ? Math.round(ms.speed * 0.621371) : ms.speed;
          currentLimitMph = limitMph;
          limitEl.textContent = limitMph;
          limitEl.classList.remove('none');
          updateSpeedColor(parseInt(document.getElementById('speedVal').textContent, 10) || 0);
        } else {
          currentLimitMph = null; limitEl.textContent = '--'; limitEl.classList.add('none');
        }
      }
      document.getElementById('distVal').textContent = formatDist(route.distance);
      const eta = new Date(Date.now() + route.duration * 1000);
      document.getElementById('etaVal').textContent = eta.getHours().toString().padStart(2,'0') + ':' + eta.getMinutes().toString().padStart(2,'0');
    }
    return route;
  } catch (e) {
    document.getElementById('turnStreet').textContent = 'Route request failed: ' + e.message;
    return null;
  }
}

function renderLanes(step) {
  const row = document.getElementById('laneRow');
  row.innerHTML = '';
  const intersections = step.intersections;
  if (!intersections || !intersections.length) return;
  const last = intersections[intersections.length - 1];
  if (!last.lanes) return;
  const iconPaths = {
    'straight': 'M12 19V5M12 5l-5 5M12 5l5 5', 'left': 'M19 12H5M5 12l6-6M5 12l6 6',
    'right': 'M5 12h14M19 12l-6-6M19 12l-6 6', 'slight left': 'M18 18L8 8M8 8v6M8 8h6',
    'slight right': 'M6 18L16 8M16 8v6M16 8h-6', 'sharp left': 'M20 20L6 6M6 6v10M6 6h10',
    'sharp right': 'M4 20L18 6M18 6v10M18 6H8', 'uturn': 'M8 5v8a4 4 0 0 0 8 0V9M16 9l3 3M16 9l-3 3'
  };
  last.lanes.forEach(lane => {
    const ind = (lane.indications && lane.indications[0]) || 'straight';
    const path = iconPaths[ind] || iconPaths['straight'];
    const div = document.createElement('div');
    div.className = 'lane-icon' + (lane.valid ? ' valid' : '');
    div.innerHTML = `<svg viewBox="0 0 24 24"><path d="${path}"/></svg>`;
    row.appendChild(div);
  });
}
function formatDist(meters) {
  const miles = meters / 1609.34;
  return miles < 0.1 ? Math.round(meters) + 'm' : miles.toFixed(1) + 'mi';
}
function formatDuration(seconds) {
  const mins = Math.round(seconds / 60);
  if (mins < 60) return mins + ' min';
  return Math.floor(mins / 60) + 'h ' + (mins % 60) + 'm';
}
function setTurnIcon(modifier) {
  const arrow = document.getElementById('turnArrow');
  const paths = {
    'left': 'M19 12H5M5 12l6-6M5 12l6 6', 'right': 'M5 12h14M19 12l-6-6M19 12l-6 6',
    'straight': 'M12 19V5M12 5l-6 6M12 5l6 6', 'slight left': 'M19 17L9 7M9 7v7M9 7h7',
    'slight right': 'M5 17L15 7M15 7v7M15 7H8', 'uturn': 'M8 5v8a4 4 0 0 0 8 0V9M16 9l3 3M16 9l-3 3'
  };
  arrow.setAttribute('d', paths[modifier] || paths['straight']);
}

async function fetchCamerasInView() {
  if (!map) return;
  const b = map.getBounds();
  const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
  if (camerasLoadedForBounds === bbox) return;
  camerasLoadedForBounds = bbox;
  const query = `[out:json][timeout:15];node["highway"="speed_camera"](${bbox});out body;`;
  try {
    const res = await fetch('https://overpass-api.de/api/interpreter', { method: 'POST', body: 'data=' + encodeURIComponent(query) });
    const data = await res.json();
    const features = (data.elements || []).map(n => ({ type: 'Feature', geometry: { type: 'Point', coordinates: [n.lon, n.lat] }, properties: { id: n.id } }));
    if (map.getSource('cameras')) map.getSource('cameras').setData({ type: 'FeatureCollection', features });
  } catch (e) { console.error('camera fetch failed', e); }
}

// ---- TRIP PLANNING ----
document.getElementById('destBtn').onclick = () => {
  document.getElementById('searchOverlay').classList.add('show');
  document.getElementById('destInput').focus();
  renderStopsChips();
};
let searchTimeout;
document.getElementById('destInput').oninput = (e) => {
  clearTimeout(searchTimeout);
  const q = e.target.value.trim();
  if (q.length < 3) { document.getElementById('searchResults').innerHTML = ''; return; }
  searchTimeout = setTimeout(() => searchPlaces(q), 350);
};
async function searchPlaces(query) {
  const center = lastPos ? { lng: lastPos[0], lat: lastPos[1] } : { lng:-3.0000, lat:51.5880 };
  const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?proximity=${center.lng},${center.lat}&country=gb&access_token=${mapboxgl.accessToken}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    const list = document.getElementById('searchResults');
    list.innerHTML = '';
    (data.features || []).forEach(f => {
      const div = document.createElement('div');
      div.className = 'result-item';
      div.innerHTML = `<div class="result-main">${f.text}</div><div class="result-sub">${f.place_name}</div>`;
      div.onclick = () => addStop(f.text, f.center);
      list.appendChild(div);
    });
    if (!data.features || !data.features.length) list.innerHTML = '<div class="result-item result-sub">No results.</div>';
  } catch (e) { document.getElementById('searchResults').innerHTML = '<div class="result-item result-sub">Search failed: ' + e.message + '</div>'; }
}
function addStop(name, center) {
  tripStops.push({ name, center });
  document.getElementById('destInput').value = '';
  document.getElementById('searchResults').innerHTML = '';
  renderStopsChips();
}
function renderStopsChips() {
  const wrap = document.getElementById('stopsChips');
  wrap.innerHTML = '';
  tripStops.forEach((s, i) => {
    const chip = document.createElement('div');
    chip.className = 'stop-chip';
    chip.innerHTML = `<span>${i+1}. ${s.name}</span><span class="remove">✕</span>`;
    chip.querySelector('.remove').onclick = () => { tripStops.splice(i, 1); renderStopsChips(); };
    wrap.appendChild(chip);
  });
  document.getElementById('previewBtn').disabled = tripStops.length === 0;
}

document.getElementById('previewBtn').onclick = async () => {
  if (!lastPos || !tripStops.length) return;
  document.getElementById('previewBtn').textContent = 'Calculating...';
  const route = await updateRoute(lastPos, tripStops.map(s => s.center));
  document.getElementById('previewBtn').textContent = 'Preview trip';
  if (!route) return;
  document.getElementById('searchOverlay').classList.remove('show');
  document.getElementById('tripSummaryTime').textContent = formatDuration(route.duration);
  document.getElementById('tripSummaryDist').textContent = formatDist(route.distance);
  document.getElementById('tripSummaryStops').textContent = tripStops.map(s => s.name).join(' → ');
  document.getElementById('tripSummary').classList.add('show');
  document.getElementById('goBtn').classList.remove('hidden');
  document.getElementById('endTripBtn').classList.remove('show');
};

document.getElementById('goBtn').onclick = () => {
  navigating = true;
  lastSpokenInstruction = '';
  lastRouteFetch = Date.now();
  document.getElementById('goBtn').classList.add('hidden');
  document.getElementById('endTripBtn').classList.add('show');
  document.getElementById('turnStreet').textContent = 'Starting navigation...';
  if (lastPos) updateRoute(lastPos, tripStops.map(s => s.center));
};
document.getElementById('endTripBtn').onclick = () => finishTrip();

function finishTrip() {
  navigating = false;
  tripStops = [];
  document.getElementById('tripSummary').classList.remove('show');
  document.getElementById('turnDistance').textContent = '--';
  document.getElementById('turnStreet').textContent = 'Tap "Plan trip" to add stops';
  document.getElementById('laneRow').innerHTML = '';
  document.getElementById('distVal').textContent = '--';
  document.getElementById('etaVal').textContent = '--:--';
  document.getElementById('limitSign').textContent = '--';
  document.getElementById('limitSign').classList.add('none');
  if (map.getSource('route')) map.getSource('route').setData({ type:'Feature', geometry:{type:'LineString', coordinates:[]} });
}

document.getElementById('recenterBtn').onclick = () => {
  if (!userMarker || !map) return;
  const pos = userMarker.getLngLat();
  map.easeTo({ center: pos, zoom: 16, duration: 500 });
};

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById('wakeIndicator').textContent = 'screen: locked';
      wakeLock.addEventListener('release', () => { document.getElementById('wakeIndicator').textContent = 'screen: released'; });
    } else { document.getElementById('wakeIndicator').textContent = 'wake lock unsupported'; }
  } catch (e) { document.getElementById('wakeIndicator').textContent = 'screen: lock failed'; }
}
document.addEventListener('visibilitychange', async () => { if (document.visibilityState === 'visible' && !wakeLock && map) requestWakeLock(); });

// ---- MOCK NOW PLAYING ----
// Does not connect to Apple Music, Spotify, or anything else. Visual only.
// Use Siri/Bluetooth for real audio, edit mockTracks below to match what's playing.
const mockTracks = [
  { title: 'Nothing queued', artist: 'tap play', color1:'#2a2a2a', color2:'#111' },
  { title: 'Blinding Lights', artist: 'The Weeknd', color1:'#3a1a1a', color2:'#1a0808' },
  { title: 'As It Was', artist: 'Harry Styles', color1:'#1a2a3a', color2:'#08131a' },
  { title: 'Sure Thing', artist: 'Miguel', color1:'#2a1a3a', color2:'#130818' }
];
let mockIndex = 0;
let mockPlaying = false;

function renderMockTrack() {
  const t = mockTracks[mockIndex];
  document.getElementById('musicTrack').textContent = t.title;
  document.getElementById('musicArtist').textContent = t.artist;
  document.getElementById('musicArt').style.background = `linear-gradient(135deg, ${t.color1}, ${t.color2})`;
  document.getElementById('musicArt').innerHTML = mockIndex === 0 ? 'NO<br>ART' : '';
}
renderMockTrack();

document.getElementById('playBtn').onclick = () => {
  if (mockIndex === 0) mockIndex = 1;
  mockPlaying = !mockPlaying;
  document.getElementById('playIcon').setAttribute('d', mockPlaying ? 'M6 5h4v14H6zm8 0h4v14h-4z' : 'M8 5v14l11-7z');
  document.getElementById('musicArtWrap').classList.toggle('playing', mockPlaying);
  document.getElementById('musicEq').classList.toggle('playing', mockPlaying);
  const fill = document.getElementById('musicProgressFill');
  fill.classList.remove('playing');
  void fill.offsetWidth;
  fill.classList.toggle('playing', mockPlaying);
  renderMockTrack();
};
function restartProgress() {
  const fill = document.getElementById('musicProgressFill');
  if (!mockPlaying) return;
  fill.classList.remove('playing');
  void fill.offsetWidth;
  fill.classList.add('playing');
}
document.getElementById('nextBtn').onclick = () => {
  mockIndex = mockIndex === 0 ? 1 : (mockIndex % (mockTracks.length - 1)) + 1;
  renderMockTrack();
  restartProgress();
};
document.getElementById('prevBtn').onclick = () => {
  mockIndex = mockIndex <= 1 ? mockTracks.length - 1 : mockIndex - 1;
  renderMockTrack();
  restartProgress();
};
</script>
